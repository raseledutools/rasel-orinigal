<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Meeting App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #111; color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* --- Loading Screen --- */
        #loading-overlay { position: fixed; inset: 0; background: #fff; z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #333; font-size: 18px; font-weight: bold; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #0b5cff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- Pre-Join Screen --- */
        #setup-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #f0f2f5; color: #333; display: flex; align-items: center; justify-content: center; z-index: 100; overflow-y: auto; padding: 20px; }
        .setup-container { display: flex; flex-wrap: wrap; gap: 30px; justify-content: center; width: 100%; max-width: 900px; background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        
        .preview-wrapper { flex: 1; min-width: 300px; position: relative; border-radius: 12px; overflow: hidden; background: #000; aspect-ratio: 16/9; }
        #pre-join-player { width: 100% !important; height: 100% !important; object-fit: cover; }
        .cam-off-msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 18px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        
        .pre-controls { position: absolute; bottom: 15px; width: 100%; display: flex; justify-content: center; gap: 15px; z-index: 10; }
        .pre-btn { background: #444; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; font-size: 18px; cursor: pointer; transition: 0.2s; outline: none; }
        .pre-btn.active-off { background: #ff4a4a !important; }

        .action-box { flex: 1; min-width: 280px; display: flex; flex-direction: column; justify-content: center; }
        .action-box h2 { color: #222; margin-bottom: 20px; font-size: 22px; text-align: center; }
        .input-group { text-align: left; margin-bottom: 15px; }
        .action-box input { width: 100%; padding: 14px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; outline: none; transition: 0.3s; }
        .action-box input:focus { border-color: #0b5cff; }
        .action-box button { width: 100%; padding: 14px; background: #0b5cff; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 5px; transition: 0.2s; }
        .action-box button:hover { background: #0046d5; }
        .divider { margin: 20px 0; color: #aaa; font-size: 14px; text-align: center; }

        /* --- Main Meeting Area --- */
        #main-meeting { display: none; flex-direction: column; height: 100vh; background: #111; width: 100%; }
        .header { background: #222; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; z-index: 10; }
        .invite-btn { background: #0b5cff; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        .main-area { display: flex; flex: 1; position: relative; overflow: hidden; width: 100%; }
        .video-container { flex: 1; padding: 10px; display: flex; align-items: center; justify-content: center; height: 100%; width: 100%; background: #1a1a1a; }
        
        /* THE MAGIC GRID FOR BIG DISPLAYS */
        #video-grid { display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 10px; width: 100%; height: 100%; align-content: center; }
        
        .video-box { flex: 1 1 100%; max-width: 100%; height: 100%; background: #000; border-radius: 10px; overflow: hidden; position: relative; border: 1px solid #333; }
        /* Make videos cover the full box beautifully */
        .video-box div { width: 100% !important; height: 100% !important; }
        .video-box video { object-fit: cover !important; } 
        
        .name-badge { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.7); color: white; padding: 4px 10px; border-radius: 5px; font-size: 13px; z-index: 10; font-weight: bold; }

        /* Dynamic Sizes */
        #video-grid[data-users="1"] .video-box { flex: 1 1 100%; max-width: 1200px; max-height: calc(100vh - 150px); }
        #video-grid[data-users="2"] .video-box { flex: 1 1 calc(50% - 10px); height: 100%; max-height: calc(100vh - 150px); }
        #video-grid[data-users="3"] .video-box, #video-grid[data-users="4"] .video-box { flex: 1 1 calc(50% - 10px); height: calc(50% - 10px); }

        /* --- Chat Sidebar --- */
        .chat-sidebar { width: 320px; background: #1a1a1a; border-left: 1px solid #333; display: none; flex-direction: column; z-index: 50; }
        .chat-header { padding: 15px; background: #222; border-bottom: 1px solid #333; font-weight: bold; display: flex; justify-content: space-between; }
        .close-chat { cursor: pointer; color: #ff4a4a; }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .chat-message { background: #333; padding: 8px 12px; border-radius: 8px; font-size: 14px; max-width: 85%; word-break: break-word; }
        .chat-message.my-msg { background: #0b5cff; align-self: flex-end; }
        .chat-input-area { padding: 10px; display: flex; background: #222; }
        .chat-input-area input { flex: 1; padding: 10px; border-radius: 5px; border: none; background: #111; color: white; outline: none; }
        .chat-input-area button { background: #0b5cff; color: white; border: none; padding: 10px 15px; margin-left: 5px; border-radius: 5px; cursor: pointer; }

        /* --- Bottom Controls --- */
        .controls-bar { background: #222; min-height: 70px; display: flex; justify-content: center; align-items: center; gap: 15px; padding: 10px; z-index: 10; }
        .control-btn { background: #444; color: white; border: none; width: 50px; height: 50px; border-radius: 50%; font-size: 18px; cursor: pointer; position: relative; outline: none; transition: 0.2s; }
        .control-btn.active-off { background: #ff4a4a !important; }
        .control-btn.danger { background: #ff4a4a; }
        .chat-badge { position: absolute; top: -5px; right: -5px; background: #ff4a4a; color: white; font-size: 11px; font-weight: bold; width: 20px; height: 20px; border-radius: 50%; display: none; align-items: center; justify-content: center; }

        @media (max-width: 768px) {
            .setup-container { padding: 20px; }
            .chat-sidebar { position: absolute; right: 0; top: 0; height: 100%; width: 100%; z-index: 200; }
            #video-grid[data-users="2"] .video-box { flex: 1 1 100%; height: calc(50% - 10px); }
            .control-btn { width: 45px; height: 45px; font-size: 16px; }
        }
    </style>
    
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.18.0.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>

    <div id="loading-overlay">
        <div class="loader"></div>
        <p>Loading Devices...</p>
    </div>

    <div id="setup-screen">
        <div class="setup-container">
            <div class="preview-wrapper">
                <div id="pre-join-player"></div>
                <div class="cam-off-msg" id="camOffMsg">
                    <i class="fas fa-video-slash" style="font-size: 30px;"></i>
                    <span>Camera is Off</span>
                </div>
                <div class="pre-controls">
                    <button class="pre-btn active-off" id="preMicBtn" title="Mic On/Off"><i class="fas fa-microphone-slash"></i></button>
                    <button class="pre-btn active-off" id="preCamBtn" title="Cam On/Off"><i class="fas fa-video-slash"></i></button>
                </div>
            </div>

            <div class="action-box">
                <h2>Ready to Join?</h2>
                
                <div id="join-link-ui" style="display: none;">
                    <div class="input-group">
                        <input type="text" id="userNameLink" placeholder="Enter Your Name">
                    </div>
                    <button id="joinFromLinkBtn">Join Meeting</button>
                </div>

                <div id="direct-visit-ui">
                    <div class="input-group">
                        <input type="text" id="userNameDirect" placeholder="Enter Your Name">
                    </div>
                    <button id="createRoomBtn">Start New Meeting</button>
                    <div class="divider">OR JOIN EXISTING</div>
                    <input type="text" id="roomInput" placeholder="Room ID (6 Digits)" maxlength="6" style="text-align: center; letter-spacing: 2px;">
                    <button id="joinRoomBtn" style="background: #28a745;">Join Meeting</button>
                </div>
            </div>
        </div>
    </div>

    <div id="main-meeting">
        <div class="header">
            <div class="room-info">Room ID: <strong id="displayRoomId" style="color: #00ff88; letter-spacing: 1px;">------</strong></div>
            <button class="invite-btn" id="inviteBtn"><i class="fas fa-user-plus"></i> Invite</button>
        </div>

        <div class="main-area">
            <div class="video-container">
                <div id="video-grid" data-users="1">
                    <div class="video-box" id="local-box">
                        <div id="local-player"></div>
                        <span class="name-badge" id="my-name-badge">You</span>
                    </div>
                </div>
            </div>
            
            <div class="chat-sidebar" id="chatSidebar">
                <div class="chat-header">
                    <span><i class="fas fa-comments"></i> Messages</span>
                    <i class="fas fa-times close-chat" id="closeChatBtn"></i>
                </div>
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input-area">
                    <input type="text" id="chatInput" placeholder="Type here...">
                    <button id="sendChatBtn"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>

        <div class="controls-bar">
            <button class="control-btn active-off" id="mainMicBtn"><i class="fas fa-microphone-slash"></i></button>
            <button class="control-btn active-off" id="mainCamBtn"><i class="fas fa-video-slash"></i></button>
            <button class="control-btn" id="shareScreenBtn" title="Share Screen"><i class="fas fa-desktop"></i></button>
            <button class="control-btn" id="toggleChat">
                <i class="fas fa-comment-alt"></i>
                <span class="chat-badge" id="chatBadge">0</span>
            </button>
            <button class="control-btn danger" id="leaveMeetingBtn" title="Leave/End"><i class="fas fa-phone-slash"></i></button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
