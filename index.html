<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Meeting App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #111; color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* --- Pre-Join Screen --- */
        #setup-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #f4f6f9; color: #333; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; overflow-y: auto; padding: 20px; }
        .setup-container { display: flex; flex-wrap: wrap; gap: 30px; justify-content: center; align-items: center; width: 100%; max-width: 1000px; }
        .preview-wrapper { flex: 1; min-width: 320px; max-width: 600px; position: relative; border-radius: 12px; overflow: hidden; background: #000; aspect-ratio: 16/9; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        #pre-join-player { width: 100% !important; height: 100% !important; object-fit: cover; }
        
        .pre-controls { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 30px; }
        .pre-btn { background: #333; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; font-size: 18px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; outline: none; }
        .pre-btn:hover { background: #555; }
        .pre-btn.active-off { background: #ff4a4a !important; }

        .action-box { flex: 1; min-width: 300px; max-width: 400px; background: white; padding: 40px 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        .action-box h2 { color: #0b5cff; margin-bottom: 25px; font-size: 24px; font-weight: 700; }
        .input-group { text-align: left; margin-bottom: 15px; }
        .input-group label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #555; }
        .action-box input { width: 100%; padding: 14px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; outline: none; transition: 0.3s; background: #f9f9f9; }
        .action-box input:focus { border-color: #0b5cff; background: #fff; }
        .action-box button { width: 100%; padding: 14px; background: #0b5cff; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .action-box button:hover { background: #0046d5; }
        
        .divider { margin: 20px 0; color: #aaa; font-size: 14px; display: flex; align-items: center; }
        .divider::before, .divider::after { content: ""; flex: 1; border-bottom: 1px solid #ddd; margin: 0 10px; }

        /* --- Main Meeting Area --- */
        #main-meeting { display: none; flex-direction: column; height: 100vh; background: #111; width: 100%; }
        .header { background: #222; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; z-index: 10; }
        .invite-btn { background: #0b5cff; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        .main-area { display: flex; flex: 1; position: relative; overflow: hidden; width: 100%; }
        
        /* Dynamic Video Grid */
        .video-container { flex: 1; padding: 10px; background: #181818; display: flex; align-items: center; justify-content: center; height: 100%; width: 100%; overflow-y: auto; }
        #video-grid { display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 10px; width: 100%; height: 100%; align-content: center; }
        
        .video-box { flex: 1 1 100%; height: 100%; background: #000; border-radius: 12px; overflow: hidden; position: relative; transition: all 0.3s ease; border: 1px solid #333; }
        .video-box div { width: 100% !important; height: 100% !important; object-fit: cover !important; }
        .name-badge { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.6); color: white; padding: 5px 12px; border-radius: 5px; font-size: 13px; z-index: 10; font-weight: bold; }

        /* Grid Logic */
        #video-grid[data-users="1"] .video-box { flex: 1 1 100%; max-width: 1000px; }
        #video-grid[data-users="2"] .video-box { flex: 1 1 calc(50% - 10px); height: calc(100% - 20px); }
        #video-grid[data-users="3"] .video-box, #video-grid[data-users="4"] .video-box { flex: 1 1 calc(50% - 10px); height: calc(50% - 10px); }

        /* Screen Share active */
        #video-grid.sharing-active .video-box.screen-active { flex: 1 1 100% !important; height: 75vh !important; order: -1; border: 2px solid #0b5cff; }
        #video-grid.sharing-active .video-box:not(.screen-active) { flex: 0 1 150px !important; height: 100px !important; }

        /* --- Chat Sidebar --- */
        .chat-sidebar { width: 320px; background: #1a1a1a; border-left: 1px solid #333; display: none; flex-direction: column; z-index: 50; }
        .chat-header { padding: 15px; background: #222; border-bottom: 1px solid #333; font-weight: bold; display: flex; justify-content: space-between; }
        .close-chat { cursor: pointer; color: #ff4a4a; }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .chat-message { background: #333; padding: 8px 12px; border-radius: 8px; font-size: 14px; max-width: 85%; word-break: break-word; }
        .chat-message.my-msg { background: #0b5cff; align-self: flex-end; }
        .chat-input-area { padding: 10px; display: flex; background: #222; }
        .chat-input-area input { flex: 1; padding: 10px; border-radius: 5px; border: none; background: #111; color: white; outline: none; }
        .chat-input-area button { background: #0b5cff; color: white; border: none; padding: 10px 15px; margin-left: 5px; border-radius: 5px; cursor: pointer; }

        /* --- Bottom Controls --- */
        .controls-bar { background: #222; min-height: 70px; display: flex; justify-content: center; align-items: center; gap: 15px; padding: 10px; z-index: 10; }
        .control-btn { background: #333; color: white; border: none; width: 50px; height: 50px; border-radius: 50%; font-size: 18px; cursor: pointer; position: relative; transition: 0.2s; display: flex; align-items: center; justify-content: center; outline: none; }
        .control-btn:hover { background: #444; }
        .control-btn.active-off { background: #ff4a4a !important; color: white !important; }
        .control-btn.danger { background: #ff4a4a; }
        .control-btn.danger:hover { background: #d03434; }
        .chat-badge { position: absolute; top: -5px; right: -5px; background: #ff4a4a; color: white; font-size: 11px; font-weight: bold; width: 20px; height: 20px; border-radius: 50%; display: none; align-items: center; justify-content: center; }

        @media (max-width: 768px) {
            .setup-container { flex-direction: column; padding: 10px; }
            .preview-wrapper { width: 100%; border-radius: 8px; }
            .chat-sidebar { position: absolute; right: 0; top: 0; height: 100%; width: 100%; z-index: 200; }
            #video-grid[data-users="2"] .video-box { flex: 1 1 100%; height: calc(50% - 10px); }
            .control-btn { width: 45px; height: 45px; font-size: 16px; }
        }
    </style>
    
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.18.0.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>

    <div id="setup-screen">
        <div class="setup-container">
            <div class="preview-wrapper">
                <div id="pre-join-player"></div>
                <div class="pre-controls">
                    <button class="pre-btn" id="preMicBtn" title="Mic On/Off"><i class="fas fa-microphone"></i></button>
                    <button class="pre-btn" id="preCamBtn" title="Cam On/Off"><i class="fas fa-video"></i></button>
                </div>
            </div>

            <div class="action-box">
                <h2><i class="fas fa-video"></i> প্রো মিটিং</h2>
                
                <div id="join-link-ui" style="display: none;">
                    <div class="input-group">
                        <label>আপনার নাম</label>
                        <input type="text" id="userNameLink" placeholder="যেমন: Rasel Mia">
                    </div>
                    <button id="joinFromLinkBtn">Join Meeting</button>
                </div>

                <div id="direct-visit-ui">
                    <div class="input-group">
                        <label>আপনার নাম</label>
                        <input type="text" id="userNameDirect" placeholder="যেমন: Rasel Mia">
                    </div>
                    <button id="createRoomBtn">New Meeting (Host)</button>
                    <div class="divider">অথবা</div>
                    <input type="text" id="roomInput" placeholder="Meeting ID (৬ ডিজিট)" maxlength="6" style="text-align: center; letter-spacing: 2px;">
                    <button id="joinRoomBtn" style="background: #28a745; margin-top: 15px;">Join Meeting</button>
                </div>
            </div>
        </div>
    </div>

    <div id="main-meeting">
        <div class="header">
            <div class="room-info">ID: <strong id="displayRoomId" style="color: #00ff88; letter-spacing: 1px;">------</strong></div>
            <button class="invite-btn" id="inviteBtn"><i class="fas fa-link"></i> ইনভাইট</button>
        </div>

        <div class="main-area">
            <div class="video-container">
                <div id="video-grid" data-users="1">
                    <div class="video-box" id="local-box">
                        <div id="local-player"></div>
                        <span class="name-badge" id="my-name-badge">You</span>
                    </div>
                </div>
            </div>
            
            <div class="chat-sidebar" id="chatSidebar">
                <div class="chat-header">
                    <span><i class="fas fa-comments"></i> চ্যাট বক্স</span>
                    <i class="fas fa-times close-chat" id="closeChatBtn"></i>
                </div>
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input-area">
                    <input type="text" id="chatInput" placeholder="মেসেজ লিখুন...">
                    <button id="sendChatBtn"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>

        <div class="controls-bar">
            <button class="control-btn" id="mainMicBtn"><i class="fas fa-microphone"></i></button>
            <button class="control-btn" id="mainCamBtn"><i class="fas fa-video"></i></button>
            <button class="control-btn" id="shareScreenBtn" title="Share Screen"><i class="fas fa-desktop"></i></button>
            <button class="control-btn" id="toggleChat">
                <i class="fas fa-comment-alt"></i>
                <span class="chat-badge" id="chatBadge">0</span>
            </button>
            <button class="control-btn danger" id="leaveMeetingBtn" title="Leave/End"><i class="fas fa-phone-slash"></i></button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
