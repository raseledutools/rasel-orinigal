<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Meeting Global</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #111; color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* --- Loading Screen --- */
        #loading-overlay { position: fixed; inset: 0; background: #fff; z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #333; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #0b5cff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- Setup Screen --- */
        #setup-screen { position: fixed; inset: 0; background: #f0f2f5; color: #333; z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
        .setup-card { display: flex; flex-wrap: wrap; gap: 20px; background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); max-width: 900px; width: 100%; }
        
        .preview-box { flex: 1; min-width: 300px; background: #000; aspect-ratio: 16/9; border-radius: 10px; position: relative; overflow: hidden; }
        #pre-join-player { width: 100% !important; height: 100% !important; }
        .cam-msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; display: flex; flex-direction: column; align-items: center; gap: 10px; font-size: 18px; display: none; }
        
        .pre-controls { position: absolute; bottom: 15px; width: 100%; display: flex; justify-content: center; gap: 15px; z-index: 10; }
        .c-btn { width: 45px; height: 45px; border-radius: 50%; border: none; background: #444; color: #fff; cursor: pointer; font-size: 18px; outline: none; transition: 0.2s; }
        .active-off { background: #ff4a4a !important; }

        .setup-actions { flex: 1; min-width: 280px; display: flex; flex-direction: column; justify-content: center; }
        .setup-actions h2 { text-align: center; margin-bottom: 20px; color: #222; }
        input { width: 100%; padding: 14px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; }
        input:focus { border-color: #0b5cff; }
        button.join-btn { width: 100%; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; background: #0b5cff; color: #fff; transition: 0.2s; }
        button.join-btn:hover { background: #0046d5; }

        /* --- Main Meeting --- */
        #main-meeting { display: none; height: 100vh; flex-direction: column; width: 100%; }
        .header { padding: 12px 20px; background: #222; display: flex; justify-content: space-between; align-items: center; z-index: 10; border-bottom: 1px solid #333; }
        
        /* The Magic CSS Grid */
        .video-container { flex: 1; display: flex; padding: 15px; background: #181818; }
        #video-grid { display: grid; gap: 15px; width: 100%; height: 100%; }
        
        /* Layouts based on participant count */
        #video-grid[data-users="1"] { grid-template-columns: 1fr; }
        #video-grid[data-users="2"] { grid-template-columns: 1fr 1fr; }
        #video-grid[data-users="3"], #video-grid[data-users="4"] { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
        
        .video-box { width: 100%; height: 100%; background: #000; border-radius: 12px; position: relative; overflow: hidden; border: 1px solid #333; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .video-box div { width: 100% !important; height: 100% !important; }
        .video-box video { object-fit: cover !important; } /* Fills the box completely */
        .name-badge { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.6); padding: 5px 12px; border-radius: 5px; font-size: 13px; font-weight: bold; }

        /* --- Chat & Controls --- */
        .chat-sidebar { width: 320px; background: #1a1a1a; border-left: 1px solid #333; display: none; flex-direction: column; z-index: 50; }
        .chat-header { padding: 15px; background: #222; border-bottom: 1px solid #333; font-weight: bold; display: flex; justify-content: space-between; }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .chat-message { background: #333; padding: 8px 12px; border-radius: 8px; font-size: 14px; max-width: 85%; word-break: break-word; }
        .chat-message.my-msg { background: #0b5cff; align-self: flex-end; }
        .chat-input-area { padding: 10px; display: flex; background: #222; }
        .chat-input-area input { flex: 1; padding: 10px; border-radius: 5px; border: none; background: #111; color: white; outline: none; margin-bottom: 0; }
        
        .controls { background: #222; padding: 15px; display: flex; justify-content: center; gap: 15px; border-top: 1px solid #333; z-index: 10; }

        /* Mobile Adjustments (Like Zoom Mobile View) */
        @media (max-width: 768px) {
            #setup-screen { padding: 0; background: #fff; }
            .setup-card { padding: 0; border-radius: 0; box-shadow: none; flex-direction: column; height: 100vh; gap: 0; }
            .preview-box { flex: none; height: 50vh; border-radius: 0; }
            .setup-actions { flex: 1; padding: 20px; justify-content: flex-start; }
            
            #video-grid[data-users="2"] { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
            .chat-sidebar { position: absolute; right: 0; top: 0; height: 100%; width: 100%; z-index: 200; }
        }
    </style>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.18.0.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>

    <div id="loading-overlay">
        <div class="loader"></div>
        <p>Loading Camera & Mic...</p>
    </div>

    <div id="setup-screen">
        <div class="setup-card">
            <div class="preview-box">
                <div id="pre-join-player"></div>
                <div class="cam-msg" id="camOffMsg">
                    <i class="fas fa-video-slash" style="font-size: 30px;"></i> Camera is Off
                </div>
                <div class="pre-controls">
                    <button id="preMicBtn" class="c-btn active-off"><i class="fas fa-microphone-slash"></i></button>
                    <button id="preCamBtn" class="c-btn active-off"><i class="fas fa-video-slash"></i></button>
                </div>
            </div>
            
            <div class="setup-actions">
                <h2>Enter Meeting Info</h2>
                
                <div id="direct-visit-ui">
                    <input type="text" id="userNameDirect" placeholder="Your Name">
                    <button id="createRoomBtn" class="join-btn">Start New Meeting</button>
                    <div style="text-align:center; margin:15px 0; color:#888;">OR JOIN EXISTING</div>
                    <input type="text" id="roomInput" placeholder="Room ID (6 Digits)" maxlength="6" style="text-align: center; letter-spacing: 2px;">
                    <button id="joinRoomBtn" class="join-btn" style="background:#28a745">Join Room</button>
                </div>

                <div id="join-link-ui" style="display:none">
                    <input type="text" id="userNameLink" placeholder="Your Name">
                    <button id="joinFromLinkBtn" class="join-btn">Join Meeting</button>
                </div>
            </div>
        </div>
    </div>

    <div id="main-meeting">
        <div class="header">
            <span>Room ID: <b id="displayRoomId" style="color: #00ff88; letter-spacing: 1px;">------</b></span>
            <button id="inviteBtn" style="background: #0b5cff; border: none; color: white; padding: 6px 15px; border-radius: 5px; cursor: pointer;"><i class="fas fa-user-plus"></i> Invite</button>
        </div>
        
        <div class="main-area">
            <div class="video-container">
                <div id="video-grid" data-users="1">
                    <div class="video-box" id="local-box">
                        <div id="local-player"></div>
                        <span class="name-badge" id="my-name-badge">You</span>
                    </div>
                </div>
            </div>
            
            <div class="chat-sidebar" id="chatSidebar">
                <div class="chat-header">
                    <span><i class="fas fa-comments"></i> In-Call Messages</span>
                    <i class="fas fa-times close-chat" id="closeChatBtn" style="cursor: pointer;"></i>
                </div>
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input-area">
                    <input type="text" id="chatInput" placeholder="Type here...">
                    <button id="sendChatBtn" style="background: #0b5cff; border: none; color: white; padding: 10px 15px; border-radius: 5px;"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
        
        <div class="controls">
            <button id="mainMicBtn" class="c-btn active-off"><i class="fas fa-microphone-slash"></i></button>
            <button id="mainCamBtn" class="c-btn active-off"><i class="fas fa-video-slash"></i></button>
            <button class="c-btn" id="toggleChat"><i class="fas fa-comment"></i></button>
            <button id="leaveMeetingBtn" class="c-btn active-off"><i class="fas fa-phone-slash"></i></button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
