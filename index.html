<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Meeting App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #111; color: white; height: 100vh; overflow: hidden; }
        
        /* --- Pre-Join Screen (Zoom Style) --- */
        #setup-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #181818; display: flex; align-items: center; justify-content: center; z-index: 100; flex-wrap: wrap; gap: 40px; padding: 20px; }
        
        .preview-box { width: 100%; max-width: 600px; aspect-ratio: 16/9; background: #000; border-radius: 15px; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .preview-box div { width: 100% !important; height: 100% !important; }
        
        .pre-controls { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; z-index: 10; }
        
        .action-box { width: 100%; max-width: 350px; background: #222; padding: 40px 30px; border-radius: 15px; text-align: center; border: 1px solid #333; }
        .action-box h2 { color: #0b5cff; margin-bottom: 25px; font-size: 24px; }
        .action-box input { width: 100%; padding: 14px; margin: 15px 0; border-radius: 8px; border: 1px solid #444; background: #111; color: white; font-size: 16px; text-align: center; letter-spacing: 2px; outline: none; transition: 0.3s; }
        .action-box input:focus { border-color: #0b5cff; }
        .action-box button { width: 100%; padding: 14px; background: #0b5cff; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-bottom: 12px; font-weight: bold; transition: 0.3s; }
        .action-box button:hover { background: #0046d5; }

        /* --- Main Meeting Area --- */
        #main-meeting { display: none; flex-direction: column; height: 100vh; }
        
        .header { background: #222; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .room-info { font-size: 16px; }
        .invite-btn { background: #0b5cff; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .invite-btn:hover { background: #0046d5; }
        
        .main-area { display: flex; flex: 1; position: relative; overflow: hidden; }
        .video-container { flex: 1; padding: 15px; display: flex; align-items: center; justify-content: center; overflow-y: auto; background: #181818; }
        #video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; width: 100%; max-width: 1200px; align-content: center; }
        
        .video-box { width: 100%; aspect-ratio: 16/9; border-radius: 12px; background: #000; border: 2px solid #333; overflow: hidden; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .video-box div { width: 100% !important; height: 100% !important; }
        
        /* --- Chat Sidebar --- */
        .chat-sidebar { width: 320px; background: #1a1a1a; border-left: 1px solid #333; display: none; flex-direction: column; z-index: 50; }
        .chat-header { padding: 15px; background: #222; border-bottom: 1px solid #333; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .close-chat { cursor: pointer; color: #ff4a4a; font-size: 20px; }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .chat-message { background: #333; padding: 8px 12px; border-radius: 8px; width: fit-content; max-width: 85%; word-break: break-word; font-size: 14px; line-height: 1.4; }
        .chat-message.my-msg { background: #0b5cff; align-self: flex-end; color: white; }
        
        .chat-input-area { padding: 10px; display: flex; border-top: 1px solid #333; background: #222; }
        .chat-input-area input { flex: 1; padding: 10px; border-radius: 5px; border: none; background: #111; color: white; outline: none; }
        .chat-input-area button { background: #0b5cff; border: none; color: white; padding: 10px 15px; margin-left: 5px; border-radius: 5px; cursor: pointer; }

        /* --- Controls Bar --- */
        .controls-bar { background: #222; min-height: 70px; display: flex; justify-content: center; align-items: center; gap: 15px; border-top: 1px solid #333; flex-wrap: wrap; padding: 10px; }
        
        .control-btn { background: #333; color: white; border: none; width: 50px; height: 50px; border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; justify-content: center; align-items: center; position: relative; transition: 0.2s; outline: none; }
        .control-btn:hover { background: #444; }
        
        /* Active/Off States (Fixing the UI Bug) */
        .control-btn.active-off { background-color: #ff4a4a !important; color: white !important; }
        .control-btn.active-off:hover { background-color: #e03e3e !important; }
        
        .control-btn.danger { background: #ff4a4a; }
        .control-btn.danger:hover { background: #e03e3e; }

        .chat-badge { position: absolute; top: -5px; right: -5px; background: #ff4a4a; color: white; font-size: 11px; font-weight: bold; width: 20px; height: 20px; border-radius: 50%; display: none; align-items: center; justify-content: center; border: 2px solid #222; }

        @media (max-width: 768px) {
            .header { flex-direction: column; gap: 10px; padding: 15px; text-align: center; }
            #setup-screen { flex-direction: column; }
            .chat-sidebar { position: absolute; right: 0; top: 0; height: 100%; width: 100%; background: #1a1a1a; z-index: 200; }
        }
    </style>
    
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.18.0.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>

    <div id="setup-screen">
        <div class="preview-box">
            <div id="pre-join-player"></div>
            
            <div class="pre-controls">
                <button class="control-btn" id="preMicBtn" title="Mic On/Off"><i class="fas fa-microphone"></i></button>
                <button class="control-btn" id="preCamBtn" title="Cam On/Off"><i class="fas fa-video"></i></button>
            </div>
        </div>

        <div class="action-box">
            <h2><i class="fas fa-video"></i> প্রো মিটিং</h2>
            <button id="createRoomBtn"><i class="fas fa-plus"></i> নতুন মিটিং তৈরি করুন</button>
            <div style="margin: 20px 0; color: #777;">অথবা</div>
            <input type="text" id="roomInput" placeholder="৬ ডিজিটের আইডি লিখুন" maxlength="6">
            <button id="joinRoomBtn"><i class="fas fa-sign-in-alt"></i> মিটিংয়ে জয়েন করুন</button>
        </div>
    </div>

    <div id="main-meeting">
        <div class="header">
            <div class="room-info">মিটিং আইডি: <strong id="displayRoomId" style="color: #00ff88; letter-spacing: 2px;">------</strong></div>
            <button class="invite-btn" id="inviteBtn"><i class="fas fa-link"></i> লিংক কপি</button>
        </div>

        <div class="main-area">
            <div class="video-container">
                <div id="video-grid">
                    <div id="local-player" class="video-box"></div>
                </div>
            </div>
            
            <div class="chat-sidebar" id="chatSidebar">
                <div class="chat-header">
                    <span><i class="fas fa-comments"></i> চ্যাট বক্স</span>
                    <i class="fas fa-times close-chat" id="closeChatBtn"></i>
                </div>
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input-area">
                    <input type="text" id="chatInput" placeholder="মেসেজ লিখুন...">
                    <button id="sendChatBtn"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>

        <div class="controls-bar">
            <button class="control-btn" id="toggleMic" title="Mute/Unmute"><i class="fas fa-microphone"></i></button>
            <button class="control-btn" id="toggleCam" title="Cam On/Off"><i class="fas fa-video"></i></button>
            <button class="control-btn" id="shareScreenBtn" title="Share Screen"><i class="fas fa-desktop"></i></button>
            
            <button class="control-btn" id="toggleChat" title="Chat">
                <i class="fas fa-comment-alt"></i>
                <span class="chat-badge" id="chatBadge">0</span>
            </button>
            
            <button class="control-btn danger" id="leaveMeeting" title="Leave"><i class="fas fa-phone-slash"></i></button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
