<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRTC Zoom Clone</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: white; margin: 0; padding: 20px; text-align: center; }
        .controls { background: #1e1e1e; padding: 20px; border-radius: 10px; margin-bottom: 20px; display: inline-block; }
        button { background: #007bff; color: white; border: none; padding: 10px 15px; margin: 5px; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold;}
        button:hover { background: #0056b3; }
        button:disabled { background: #555; cursor: not-allowed; }
        input { padding: 10px; border-radius: 5px; border: 1px solid #ccc; margin: 5px; font-size: 16px; color: black; text-align: center;}
        
        #video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }
        video {
            width: 100%;
            border-radius: 10px;
            background: #222;
            border: 2px solid #444;
            transform: scaleX(-1);
        }
        #currentRoomId { color: #00ff88; font-size: 24px; letter-spacing: 2px; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>

    <h2>🎥 ৬-ডিজিট আইডির গ্রুপ মিটিং</h2>
    
    <div class="controls">
        <button id="startCamBtn">১. ক্যামেরা ও মাইক চালু করুন</button>
        <br><br>
        <button id="createRoomBtn" disabled>নতুন মিটিং তৈরি করুন</button>
        <p>আপনার মিটিং আইডি: <strong id="currentRoomId">------</strong></p>
        <hr style="border-color: #333;">
        <input type="text" id="roomInput" placeholder="৬ ডিজিটের আইডি দিন" maxlength="6">
        <button id="joinRoomBtn" disabled>মিটিংয়ে জয়েন করুন</button>
    </div>

    <div id="video-grid">
        <video id="localVideo" autoplay playsinline muted></video>
    </div>

    <script src="webrtc.js"></script>
    <script src="app.js"></script>
</body>
</html>
