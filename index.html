<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Meeting App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #111; color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* --- Pre-Join Screen --- */
        #setup-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #fff; color: #333; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; z-index: 100; overflow-y: auto; }
        .preview-container { width: 100%; max-width: 600px; aspect-ratio: 16/9; background: #000; position: relative; overflow: hidden; margin-top: 20px; border-radius: 12px; }
        #pre-join-player { width: 100% !important; height: 100% !important; }
        
        .floating-controls { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); background: rgba(0, 0, 0, 0.7); padding: 10px 20px; border-radius: 30px; display: flex; gap: 25px; z-index: 10; }
        .floating-btn { background: transparent; border: none; color: white; text-align: center; cursor: pointer; font-size: 12px; outline: none; }
        .floating-btn i { font-size: 20px; margin-bottom: 5px; display: block; }
        .floating-btn.active-off { color: #ff4a4a; }
        
        .action-box { width: 100%; max-width: 500px; padding: 30px 20px; text-align: center; }
        .action-box h3 { font-size: 20px; margin-bottom: 20px; color: #222; }
        .input-group { text-align: left; margin-bottom: 15px; }
        .input-group label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #555; }
        .action-box input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; outline: none; transition: 0.3s; }
        .action-box input:focus { border-color: #0b5cff; }
        .action-box button { width: 100%; padding: 14px; background: #0b5cff; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .action-box button:disabled { background: #888; cursor: not-allowed; }
        
        /* --- Main Meeting Area --- */
        #main-meeting { display: none; flex-direction: column; height: 100vh; background: #111; width: 100%; }
        .header { background: #222; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .invite-btn { background: #0b5cff; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        .main-area { display: flex; flex: 1; position: relative; overflow: hidden; width: 100%; }
        .video-container { flex: 1; padding: 10px; background: #181818; display: flex; align-items: center; justify-content: center; height: 100%; width: 100%; }
        
        /* --- Dynamic Grid System (ম্যাজিক এখানে) --- */
        #video-grid { display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 10px; width: 100%; height: 100%; }
        
        .video-box { flex: 1 1 calc(50% - 10px); height: calc(50% - 10px); min-width: 250px; border-radius: 10px; background: #000; overflow: hidden; position: relative; transition: all 0.3s ease; }
        .video-box div { width: 100% !important; height: 100% !important; object-fit: cover; }
        .name-badge { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.6); color: white; padding: 4px 10px; border-radius: 5px; font-size: 12px; z-index: 10; }

        /* ১ জনের জন্য ফুল স্ক্রিন */
        #video-grid[data-users="1"] .video-box { flex: 1 1 100%; height: 100%; }
        /* ২ জনের জন্য পাশাপাশি */
        #video-grid[data-users="2"] .video-box { flex: 1 1 calc(50% - 10px); height: 100%; }

        /* স্ক্রিন শেয়ারের জন্য স্পেশাল ডিজাইন */
        #video-grid.sharing-active .video-box.screen-active { flex: 1 1 100% !important; height: 75vh !important; order: -1; border: 2px solid #0b5cff; }
        #video-grid.sharing-active .video-box:not(.screen-active) { flex: 0 1 150px !important; height: 100px !important; }

        /* --- Chat & Controls --- */
        .chat-sidebar { width: 320px; background: #1a1a1a; border-left: 1px solid #333; display: none; flex-direction: column; z-index: 50; }
        .chat-header { padding: 15px; background: #222; border-bottom: 1px solid #333; font-weight: bold; display: flex; justify-content: space-between; }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .chat-message { background: #333; padding: 8px 12px; border-radius: 8px; font-size: 14px; max-width: 85%; }
        .chat-message.my-msg { background: #0b5cff; align-self: flex-end; }
        .chat-input-area { padding: 10px; display: flex; background: #222; }
        .chat-input-area input { flex: 1; padding: 10px; border-radius: 5px; border: none; background: #111; color: white; }
        .chat-input-area button { background: #0b5cff; color: white; border: none; padding: 10px 15px; margin-left: 5px; border-radius: 5px; cursor: pointer; }

        .controls-bar { background: #222; min-height: 70px; display: flex; justify-content: center; align-items: center; gap: 15px; padding: 10px; padding-bottom: env(safe-area-inset-bottom, 10px); }
        .control-btn { background: #333; color: white; border: none; width: 50px; height: 50px; border-radius: 50%; font-size: 18px; cursor: pointer; position: relative; transition: 0.2s; }
        .control-btn.active-off { background: #ff4a4a !important; color: white !important; }
        .control-btn.danger { background: #ff4a4a; }
        .control-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .chat-badge { position: absolute; top: -5px; right: -5px; background: #ff4a4a; color: white; font-size: 11px; font-weight: bold; width: 20px; height: 20px; border-radius: 50%; display: none; align-items: center; justify-content: center; }

        /* Mobile specific adjustments */
        @media (max-width: 768px) {
            .preview-container { margin-top: 0; border-radius: 0; }
            .chat-sidebar { position: absolute; right: 0; top: 0; height: 100%; width: 100%; z-index: 200; }
            /* মোবাইলে ২ জন হলে ওপর-নিচ হবে */
            #video-grid[data-users="2"] .video-box { flex: 1 1 100%; height: calc(50% - 10px); }
            #video-grid.sharing-active .video-box.screen-active { height: 60vh !important; }
            .control-btn { width: 45px; height: 45px; font-size: 16px; }
        }
    </style>
    
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.18.0.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>

    <div id="setup-screen">
        <div class="preview-container">
            <div id="pre-join-player"></div>
            <div class="floating-controls">
                <button class="floating-btn" id="preMicBtn"><i class="fas fa-microphone"></i><span>Mute</span></button>
                <button class="floating-btn" id="preCamBtn"><i class="fas fa-video"></i><span>Stop Video</span></button>
            </div>
        </div>

        <div class="action-box">
            <h3>Enter Meeting Info</h3>
            <div id="join-link-ui" style="display: none;">
                <div class="input-group">
                    <label>Your Name</label>
                    <input type="text" id="userNameLink" placeholder="e.g. Rasel Mia">
                </div>
                <button id="joinFromLinkBtn">Join Meeting</button>
            </div>

            <div id="direct-visit-ui">
                <div class="input-group">
                    <label>Your Name</label>
                    <input type="text" id="userNameDirect" placeholder="e.g. Rasel Mia">
                </div>
                <button id="createRoomBtn">New Meeting</button>
                <div style="margin: 15px 0; color: #888; font-size: 14px;">or join an existing one</div>
                <input type="text" id="roomInput" placeholder="Meeting ID (6 Digits)" maxlength="6" style="text-align: center; letter-spacing: 2px;">
                <button id="joinRoomBtn" style="background: #28a745;">Join</button>
            </div>
        </div>
    </div>

    <div id="main-meeting">
        <div class="header">
            <div class="room-info">ID: <strong id="displayRoomId" style="color: #00ff88;">------</strong></div>
            <button class="invite-btn" id="inviteBtn"><i class="fas fa-user-plus"></i> Invite</button>
        </div>

        <div class="main-area">
            <div class="video-container">
                <div id="video-grid" data-users="1">
                    <div class="video-box" id="local-box">
                        <div id="local-player"></div>
                        <span class="name-badge" id="my-name-badge">You</span>
                    </div>
                </div>
            </div>
            
            <div class="chat-sidebar" id="chatSidebar">
                <div class="chat-header">
                    <span><i class="fas fa-comments"></i> Messages</span>
                    <i class="fas fa-times close-chat" id="closeChatBtn"></i>
                </div>
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input-area">
                    <input type="text" id="chatInput" placeholder="Type a message...">
                    <button id="sendChatBtn"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>

        <div class="controls-bar">
            <button class="control-btn" id="toggleMic"><i class="fas fa-microphone"></i></button>
            <button class="control-btn" id="toggleCam"><i class="fas fa-video"></i></button>
            <button class="control-btn" id="shareScreenBtn" title="Share Screen"><i class="fas fa-desktop"></i></button>
            <button class="control-btn" id="toggleChat">
                <i class="fas fa-comment-alt"></i>
                <span class="chat-badge" id="chatBadge">0</span>
            </button>
            <button class="control-btn danger" id="leaveMeeting"><i class="fas fa-phone-slash"></i></button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
